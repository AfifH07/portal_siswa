<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Portal Ponpes Baron</title>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #065f46 0%, #047857 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .loader {
            text-align: center;
            color: white;
        }
        .loader h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <h2>Memuat Dashboard...</h2>
    </div>

    <script>
        // Dashboard Router - validates role via API (secure)
        (async function() {
            const token = localStorage.getItem('access_token');

            if (!token) {
                window.location.href = '/login';
                return;
            }

            try {
                // ALWAYS fetch role from API - this is the authenticated source
                const response = await fetch('/api/users/me/', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        // Try refresh token
                        const refreshToken = localStorage.getItem('refresh_token');
                        if (refreshToken) {
                            const refreshResp = await fetch('/api/auth/token/refresh/', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ refresh: refreshToken })
                            });
                            if (refreshResp.ok) {
                                const refreshData = await refreshResp.json();
                                localStorage.setItem('access_token', refreshData.access);
                                window.location.reload();
                                return;
                            }
                        }
                    }
                    throw new Error('Auth failed');
                }

                const data = await response.json();
                const role = data.role;

                if (!role) {
                    throw new Error('No role');
                }

                // Update localStorage with VERIFIED role from server
                localStorage.setItem('user_role', role);
                localStorage.setItem('user', JSON.stringify(data));

                // Store verified role in sessionStorage for template validation
                sessionStorage.setItem('verified_role', role);
                sessionStorage.setItem('verified_timestamp', Date.now().toString());

                // Redirect to role-specific dashboard URL
                const dashboardMap = {
                    'walisantri': '/dashboard/parent/',
                    'guru': '/dashboard/ustadz/',
                    'musyrif': '/dashboard/ustadz/',
                    'wali_kelas': '/dashboard/ustadz/',
                    'bk': '/dashboard/ustadz/',
                    'superadmin': '/dashboard/admin/',
                    'pimpinan': '/dashboard/admin/',
                    'bendahara': '/dashboard/admin/',
                };

                const targetUrl = dashboardMap[role] || '/dashboard/admin/';
                window.location.href = targetUrl;

            } catch (error) {
                console.error('Dashboard router error:', error);
                localStorage.removeItem('access_token');
                localStorage.removeItem('refresh_token');
                window.location.href = '/login';
            }
        })();
    </script>
</body>
</html>
