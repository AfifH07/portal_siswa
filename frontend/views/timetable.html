<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Pelajaran - Portal Ponpes Baron</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Baron Light Emerald Theme -->
    <link href="/static/css/baron-emerald.css?v=20260502" rel="stylesheet">
    <link href="/static/css/users.css?v=20260502" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        /* ============================================
           TIMETABLE PAGE SPECIFIC STYLES
        ============================================ */

        /* Day Section */
        .day-section {
            margin-bottom: 24px;
        }
        .day-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            padding: 12px 16px;
            background: var(--bg-base, #f9fafb);
            border-radius: 10px;
        }
        .day-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: white;
        }
        .day-icon.senin { background: linear-gradient(135deg, #10b981, #059669); }
        .day-icon.selasa { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .day-icon.rabu { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .day-icon.kamis { background: linear-gradient(135deg, #ec4899, #db2777); }
        .day-icon.jumat { background: linear-gradient(135deg, #6366f1, #4f46e5); }
        .day-icon.sabtu { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .day-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main, #111827);
        }
        .day-subtitle {
            font-size: 0.85rem;
            color: var(--text-sub, #6b7280);
        }

        /* Timetable Grid */
        .timetable-grid {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--glass-border, rgba(16, 185, 129, 0.1));
            -webkit-overflow-scrolling: touch;
        }
        .timetable-table {
            border-collapse: collapse;
            width: 100%;
            table-layout: fixed;
        }
        .timetable-table th,
        .timetable-table td {
            border: 1px solid var(--glass-border, rgba(16, 185, 129, 0.15));
            padding: 6px 8px;
            text-align: center;
            vertical-align: middle;
            font-size: 0.8rem;
        }
        .timetable-table thead th {
            background: var(--emerald-50, #ecfdf5);
            color: var(--emerald-800, #065f46);
            font-weight: 700;
            font-size: 0.85rem;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .timetable-table th.jam-col {
            width: 80px;
            min-width: 80px;
            max-width: 80px;
            background: var(--emerald-100, #d1fae5);
        }

        /* Sesi Subheader Row */
        .sesi-subheader {
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            padding: 6px 12px !important;
            text-transform: uppercase;
            text-align: left !important;
        }
        .sesi-subheader.tahfidz {
            background: #059669;
            color: white;
        }
        .sesi-subheader.kbm {
            background: #065f46;
            color: white;
        }
        .sesi-subheader.diniyah {
            background: #1e3a5f;
            color: white;
        }

        /* Jam Cell */
        .jam-cell {
            background: var(--emerald-50, #ecfdf5);
            font-family: 'DM Mono', monospace;
            padding: 8px 6px !important;
            width: 80px;
            min-width: 80px;
            max-width: 80px;
        }
        .jam-waktu-start {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--emerald-700, #047857);
            line-height: 1.2;
        }
        .jam-waktu-end {
            font-size: 0.75rem;
            color: var(--text-muted, #9ca3af);
            line-height: 1.2;
        }
        .jam-ke-fallback {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--emerald-600, #059669);
        }

        /* Schedule Cell */
        .schedule-cell {
            padding: 6px 8px;
            border-radius: 6px;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            min-height: 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2px;
        }
        .schedule-mapel {
            font-weight: 700;
            font-size: 0.85rem;
            line-height: 1.2;
        }
        .schedule-guru {
            font-size: 0.7rem;
            opacity: 0.85;
        }

        /* Empty Cell */
        .empty-cell {
            background: #f3f4f6;
            color: #9ca3af;
            font-size: 0.8rem;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Legend */
        .legend-card {
            margin-top: 24px;
        }
        .legend-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: var(--bg-base, #f9fafb);
            border-radius: 8px;
        }
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }
        .legend-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-main, #111827);
        }

        /* Loading State */
        .loading-state {
            padding: 60px;
            text-align: center;
            color: var(--text-sub, #6b7280);
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--emerald-100, #d1fae5);
            border-top-color: var(--emerald-500, #10b981);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            padding: 60px;
            text-align: center;
        }
        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        .empty-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main, #111827);
            margin-bottom: 8px;
        }
        .empty-desc {
            color: var(--text-sub, #6b7280);
        }

        /* Stats Row for Timetable */
        .timetable-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-mini {
            background: white;
            border: 1px solid var(--glass-border, rgba(16, 185, 129, 0.1));
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .stat-mini-val {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--emerald-600, #059669);
        }
        .stat-mini-label {
            font-size: 0.8rem;
            color: var(--text-sub, #6b7280);
            margin-top: 4px;
        }
    </style>
</head>
<body data-role="">

<!-- ===================== SIDEBAR ===================== -->
<aside class="sidebar">
    <div class="sidebar-brand">
        <div class="brand-logo">🕌</div>
        <div class="brand-text">
            <div class="brand-name">Baron Ponpes</div>
            <div class="brand-tagline">Portal Akademik</div>
        </div>
    </div>

    <a class="back-chip" href="/">
        <span class="arrow">←</span>
        <span>Kembali ke Website</span>
    </a>

    <nav class="sidebar-nav" id="sidebar-nav">
        <!-- Sidebar will be dynamically rendered by auth-check.js -->
    </nav>

    <div class="sidebar-footer">
        <div class="user-chip">
            <div class="user-avatar" id="user-avatar-initials">U</div>
            <div class="user-meta">
                <div class="user-name" id="user-name-display">Loading...</div>
                <div class="user-role" id="user-role-display">-</div>
            </div>
        </div>
        <button class="btn-logout" onclick="window.logout()">🚪 Keluar</button>
    </div>
</aside>

<!-- ===================== MAIN ===================== -->
<main class="main">

    <!-- Topbar -->
    <div class="topbar">
        <div class="topbar-left">
            <h1 id="page-title">Jadwal Pelajaran</h1>
            <div class="breadcrumb">Portal Ponpes Baron &rsaquo; <span>Jadwal Pelajaran</span></div>
        </div>
        <div class="topbar-right">
            <div class="topbar-date" id="topbar-date">📅 Loading...</div>
            <div class="topbar-academic-year">📚 <strong>Memuat...</strong></div>
        </div>
    </div>

    <div class="page-body">

        <!-- Stats -->
        <div class="timetable-stats" id="timetable-stats">
            <div class="stat-mini">
                <div class="stat-mini-val" id="stat-total-jadwal">0</div>
                <div class="stat-mini-label">Total Jadwal</div>
            </div>
            <div class="stat-mini">
                <div class="stat-mini-val" id="stat-total-guru">0</div>
                <div class="stat-mini-label">Guru Mengajar</div>
            </div>
            <div class="stat-mini">
                <div class="stat-mini-val" id="stat-total-kelas">0</div>
                <div class="stat-mini-label">Kelas Terjadwal</div>
            </div>
            <div class="stat-mini">
                <div class="stat-mini-val" id="stat-total-mapel">0</div>
                <div class="stat-mini-label">Mata Pelajaran</div>
            </div>
        </div>

        <!-- Timetable Container -->
        <div id="timetable-container">
            <div class="glass-card">
                <div class="loading-state" id="loading-state">
                    <div class="loading-spinner"></div>
                    <p>Memuat jadwal pelajaran...</p>
                </div>
            </div>
        </div>

        <!-- Legend -->
        <div class="glass-card legend-card" id="legend-card" style="display: none;">
            <div class="card-head">
                <h3><span class="ch-icon">🎨</span> Legenda Guru</h3>
            </div>
            <div class="card-body">
                <div class="legend-grid" id="legend-grid">
                    <!-- Populated dynamically -->
                </div>
            </div>
        </div>

    </div>
</main>

<!-- Toast Notification -->
<div class="toast-container" id="toast-container"></div>

<!-- Scripts -->
<script src="/static/js/utils.js?v=20260502"></script>
<script src="/static/js/apiConfig.js?v=20260502"></script>
<script src="/static/js/apiFetch.js?v=20260502"></script>
<script src="/static/js/auth-check.js?v=20260530adminsantri" defer></script>
<script src="/static/js/timetable.js?v=20260502"></script>

</body>
</html>
