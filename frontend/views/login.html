<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Portal Ponpes Baron</title>
    <link href="/static/css/style.css" rel="stylesheet">
    <link href="/static/css/auth.css" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="glass-card">
            <div class="login-header">
                <h1>Portal Ponpes Baron</h1>
                <p>Silakan login untuk melanjutkan</p>
            </div>
            
            <form id="login-form" class="login-form" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <i class="input-icon">👤</i>
                        <input type="text" id="username" name="username" placeholder="Masukkan username" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="input-icon">🔒</i>
                        <input type="password" id="password" name="password" placeholder="Masukkan password" required>
                        <button type="button" class="show-password" id="toggle-password">
                            <i>👁️</i>
                        </button>
                    </div>
                </div>
                
                <div class="form-actions">
                    <label class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        <span>Ingat saya</span>
                    </label>
                </div>
                
                <button type="submit" class="btn-login">
                    <span class="btn-text">Login</span>
                    <span class="btn-loader" style="display: none;">
                        <i>⏳</i> Loading...
                    </span>
                </button>
                
                <div class="error-message" id="error-message" style="display: none;">
                    <i>⚠️</i> <span></span>
                </div>
            </form>
            
            <div class="login-footer">
                <p>Belum punya akun? <a href="/registration">Daftar sekarang</a></p>
                <p><a href="/forgot-password/" id="forgot-password">Lupa password?</a></p>
            </div>
        </div>
    </div>
     
    <script src="/static/js/apiConfig.js" defer></script>
    <script src="/static/js/apiFetch.js" defer></script>
    <script src="/static/js/auth-check.js" defer></script>
    <script src="/static/js/auth.js" defer></script>
</body>
</html>
