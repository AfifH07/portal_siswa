<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Ponpes Baron</title>
    <link rel="icon" type="image/png" href="/static/images/logo_ponpes.png">
    <link href="/static/css/style.css?v=20260530watermark2" rel="stylesheet">
    <link href="/static/css/auth.css?v=20260531islamic2" rel="stylesheet">
</head>
<body>
    <div class="geo-pattern" aria-hidden="true"></div>
    <div class="login-container">
        <div class="glass-card">
            <div class="login-ornament">
                <div class="ornament-line"></div>
                <div class="ornament-dot"></div>
                <div class="ornament-diamond"></div>
                <div class="ornament-dot"></div>
                <div class="ornament-line"></div>
            </div>
            <div class="login-header">
                <div class="login-logo">
                    <img src="/static/images/logo_ponpes.png" alt="Logo Al-Ihsan Baron">
                </div>
                <h1>Pondok Pesantren Al-Ihsan Baron</h1>
                <p>Portal Siswa - Sistem Informasi Akademik</p>
            </div>
            <div class="login-divider">
                <div class="login-divider-line"></div>
                <div class="login-divider-text">MASUK AKUN</div>
                <div class="login-divider-line"></div>
            </div>
            
            <form id="login-form" class="login-form" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <i class="input-icon">👤</i>
                        <input type="text" id="username" name="username" placeholder="Masukkan username" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="input-icon">🔒</i>
                        <input type="password" id="password" name="password" placeholder="Masukkan password" required>
                        <button type="button" class="show-password" id="toggle-password">
                            <i>👁️</i>
                        </button>
                    </div>
                </div>
                
                <div class="form-actions">
                    <label class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        <span>Ingat saya</span>
                    </label>
                </div>
                
                <button type="submit" class="btn-login">
                    <span class="btn-text">Login</span>
                    <span class="btn-loader" style="display: none;">
                        <i>⏳</i> Loading...
                    </span>
                </button>
                
                <div class="error-message" id="error-message" style="display: none;">
                    <i>⚠️</i> <span></span>
                </div>
            </form>
            
            <div class="login-footer">
                <p><a href="/forgot-password/" id="forgot-password">Lupa password?</a></p>
            </div>
        </div>
    </div>
     
    <script src="/static/js/apiConfig.js?v=20260327" defer></script>
    <script src="/static/js/apiFetch.js?v=20260327" defer></script>
    <script src="/static/js/auth-check.js?v=20260530adminsantri" defer></script>
    <script src="/static/js/auth.js?v=20260528role" defer></script>
</body>
</html>
